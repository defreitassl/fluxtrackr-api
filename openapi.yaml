        '200': { description: Cobranças em ordem cronológica, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/SubscriptionCharge' } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /subscription-charges/{id}:
    get:
      tags: [Subscriptions]
      operationId: getSubscriptionCharge
      summary: Busca uma cobrança de assinatura
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200': { description: Cobrança encontrada, content: { application/json: { schema: { $ref: '#/components/schemas/SubscriptionCharge' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/SubscriptionChargeNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /subscription-charges/{id}/realize:
    post:
      tags: [Subscriptions]
      operationId: realizeSubscriptionCharge
      summary: Realiza cobrança pendente em conta ou cartão
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/RealizeSubscriptionChargeRequest' } } }
      responses:
        '201': { description: Cobrança realizada, content: { application/json: { schema: { $ref: '#/components/schemas/RealizeSubscriptionChargeResponse' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/SubscriptionChargeNotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /subscription-charges/{id}/cancel:
    post:
      tags: [Subscriptions]
      operationId: cancelSubscriptionCharge
      summary: Cancela uma cobrança pendente
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '201': { description: Cobrança cancelada, content: { application/json: { schema: { $ref: '#/components/schemas/SubscriptionCharge' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/SubscriptionChargeNotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /notifications:
    get:
      tags: [Notification center]
      operationId: listNotifications
      summary: Lista notificações por cursor
      parameters:
        - name: category
          in: query
          schema: { $ref: '#/components/schemas/NotificationCategory' }
        - name: type
          in: query
          schema: { $ref: '#/components/schemas/NotificationType' }
        - name: severity
          in: query
          schema: { $ref: '#/components/schemas/NotificationSeverity' }
        - name: isRead
          in: query
          schema: { type: boolean }
        - name: includeResolved
          in: query
          schema: { type: boolean, default: false }
        - name: includeDismissed
          in: query
          schema: { type: boolean, default: false }
        - $ref: '#/components/parameters/StartDateQuery'
        - $ref: '#/components/parameters/EndDateQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/CursorQuery'
      responses:
        '200': { description: Página de notificações, content: { application/json: { schema: { $ref: '#/components/schemas/NotificationPage' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /notifications/unread-count:
    get:
      tags: [Notification center]
      operationId: getUnreadNotificationsCount
      summary: Conta alertas ativos não lidos
      responses:
        '200': { description: Contagem, content: { application/json: { schema: { $ref: '#/components/schemas/UnreadCount' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /notifications/read-all:
    post:
      tags: [Notification center]
      operationId: markAllNotificationsRead
      summary: Marca todos os alertas ativos como lidos
      responses:
        '201': { description: Quantidade atualizada, content: { application/json: { schema: { $ref: '#/components/schemas/UpdatedCount' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /notifications/{id}/read:
    patch:
      tags: [Notification center]
      operationId: markNotificationRead
      summary: Marca uma notificação como lida de forma idempotente
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200': { description: Notificação após a leitura, content: { application/json: { schema: { $ref: '#/components/schemas/Notification' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotificationNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /notifications/{id}:
    delete:
      tags: [Notification center]
      operationId: dismissNotification
      summary: Dispensa uma notificação de forma idempotente
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200': { description: Notificação dispensada, content: { application/json: { schema: { $ref: '#/components/schemas/DismissedResponse' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotificationNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /notification-preferences:
    get:
      tags: [Notification center]
      operationId: getNotificationPreferences
      summary: Retorna preferências efetivas, incluindo defaults
      responses:
        '200': { description: Preferências, content: { application/json: { schema: { $ref: '#/components/schemas/NotificationPreferences' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    patch:
      tags: [Notification center]
      operationId: updateNotificationPreferences
      summary: Atualiza preferências em lote de forma atômica
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateNotificationPreferencesRequest' } } }
      responses:
        '200': { description: Preferências efetivas após atualização, content: { application/json: { schema: { $ref: '#/components/schemas/NotificationPreferences' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /activities:
    get:
      tags: [Notification center]
      operationId: listActivities
      summary: Lista a auditoria funcional por cursor
      parameters:
        - name: type
          in: query
          schema: { $ref: '#/components/schemas/ActivityType' }
        - name: entityType
          in: query
          schema: { $ref: '#/components/schemas/ActivityEntityType' }
        - name: entityId
          in: query
          schema: { $ref: '#/components/schemas/Uuid' }
        - $ref: '#/components/parameters/StartDateQuery'
        - $ref: '#/components/parameters/EndDateQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/CursorQuery'
      responses:
        '200': { description: Página de atividades, content: { application/json: { schema: { $ref: '#/components/schemas/ActivityPage' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token retornado por `POST /auth/login`.
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Uuid' }
    AccountIdPath:
      name: accountId
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Uuid' }
    TransactionTypeQuery:
      name: type
      in: query
      schema: { $ref: '#/components/schemas/TransactionType' }
    CategoryIdQuery:
      name: categoryId
      in: query
      schema: { $ref: '#/components/schemas/Uuid' }
    AccountIdQuery:
      name: accountId
      in: query
      schema: { $ref: '#/components/schemas/Uuid' }
    PaymentMethodQuery:
      name: paymentMethod
      in: query
      schema: { $ref: '#/components/schemas/PaymentMethod' }
    IsActiveQuery:
      name: isActive
      in: query
      schema: { type: boolean }
    StartDateTimeQuery:
      name: startDate
      in: query
      schema: { $ref: '#/components/schemas/DateTime' }
    EndDateTimeQuery:
      name: endDate
      in: query
      schema: { $ref: '#/components/schemas/DateTime' }
    StartDateQuery:
      name: startDate
      in: query
      schema: { $ref: '#/components/schemas/Date' }
    EndDateQuery:
      name: endDate
      in: query
      schema: { $ref: '#/components/schemas/Date' }
    AsOfDateTimeQuery:
      name: asOf
      in: query
      schema: { $ref: '#/components/schemas/DateTime' }
    AsOfDateQuery:
      name: asOf
      in: query
      schema: { $ref: '#/components/schemas/Date' }
    LimitQuery:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
    CursorQuery:
      name: cursor
      in: query
      schema: { $ref: '#/components/schemas/Uuid' }
  responses:
    BadRequest:
      description: Payload, parâmetro, regra de negócio ou cursor inválido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: JWT ausente, inválido ou credenciais inválidas
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Recurso não encontrado ou não pertencente ao usuário autenticado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflito de unicidade, transição de estado ou escrita concorrente
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    InternalServerError:
      description: Erro inesperado do servidor
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    TransactionNotFound: { $ref: '#/components/responses/NotFound' }
    CategoryNotFound: { $ref: '#/components/responses/NotFound' }
    AccountNotFound: { $ref: '#/components/responses/NotFound' }
    AccountTransferNotFound: { $ref: '#/components/responses/NotFound' }
    FixedExpenseNotFound: { $ref: '#/components/responses/NotFound' }
    FixedIncomeNotFound: { $ref: '#/components/responses/NotFound' }
    FixedOccurrenceNotFound: { $ref: '#/components/responses/NotFound' }
    CreditCardNotFound: { $ref: '#/components/responses/NotFound' }
    CreditCardPurchaseNotFound: { $ref: '#/components/responses/NotFound' }
    CreditCardInvoiceNotFound: { $ref: '#/components/responses/NotFound' }
    FinancialEventNotFound: { $ref: '#/components/responses/NotFound' }
    CategoryBudgetNotFound: { $ref: '#/components/responses/NotFound' }
    FinancialGoalNotFound: { $ref: '#/components/responses/NotFound' }
    SubscriptionNotFound: { $ref: '#/components/responses/NotFound' }
    SubscriptionChargeNotFound: { $ref: '#/components/responses/NotFound' }
    NotificationNotFound: { $ref: '#/components/responses/NotFound' }
  schemas:
    Uuid:
      type: string
      format: uuid
    DateTime:
      type: string
      format: date-time
    Date:
      type: string
      format: date
    Money:
      type: string
      pattern: '^-?\\d{1,10}\\.\\d{2}$'
      examples: ['123.45']
    PositiveMoney:
      type: string
      pattern: '^(?!0+\\.00$)\\d{1,10}\\.\\d{2}$'
      examples: ['123.45']
    ErrorResponse:
      type: object
      required: [statusCode, message]
      properties:
        statusCode: { type: integer, examples: [400] }
        message:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        error: { type: string }
    HealthStatus:
      type: object
      required: [status, api, database]
      properties:
        status: { const: ok }
        api: { const: up }
        database: { const: up }
    HealthUnavailable:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            status: { const: error }
            api: { const: up }
            database: { const: down }
    AccessToken:
      type: object
      required: [accessToken]
      properties:
        accessToken: { type: string }
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }
    TransactionType:
      type: string
      enum: [income, expense]
    TransactionSource:
      type: string
      enum: [app, telegram]
    PaymentMethod:
      type: string
      enum: [pix, debit, credit, cash, transfer, boleto]
    CategoryType:
      type: string
      enum: [income, expense, both]
    AccountType:
      type: string
      enum: [checking, savings, wallet, cash, investment, other]
    CreditCardInvoiceStatus:
      type: string
      enum: [open, closed, paid, overdue, canceled]
    InstallmentStatus:
      type: string
      enum: [pending, paid, canceled]
    RecurrenceType:
      type: string
      enum: [once, monthly, yearly, semiannual, custom]
    FinancialEventStatus:
      type: string
      enum: [planned, confirmed, postponed, canceled, realized]
    FixedOccurrenceType:
      type: string
      enum: [expense, income]
    FixedOccurrenceStatus:
      type: string
      enum: [pending, realized, canceled]
    SubscriptionChargeStatus:
      type: string
      enum: [pending, realized, canceled]
    FinancialGoalStatus:
      type: string
      enum: [active, completed, canceled]
    GoalContributionType:
      type: string
      enum: [contribution, withdrawal]
    NotificationCategory:
      type: string
      enum: [invoices, events, subscriptions, budgets, goals]
    NotificationType:
      type: string
      enum: [invoice_due_soon, invoice_overdue, financial_event_upcoming, subscription_charge_upcoming, subscription_charge_overdue, budget_near_limit, budget_exceeded, goal_deadline_upcoming, goal_overdue]
    NotificationSeverity:
      type: string
      enum: [info, warning, critical]
    NotificationSourceType:
      type: string
      enum: [credit_card_invoice, financial_event, subscription_charge, category_budget, financial_goal]
    ActivityType:
      type: string
      enum: [transaction_created, transaction_updated, transaction_deleted, transfer_created, balance_adjustment_created, invoice_paid, financial_event_confirmed, financial_event_realized, financial_event_postponed, financial_event_canceled, subscription_created, subscription_updated, subscription_archived, subscription_charge_realized, subscription_charge_canceled, category_archived, category_reactivated, category_budget_created, category_budget_updated, category_budget_archived, financial_goal_created, financial_goal_updated, financial_goal_completed, financial_goal_reopened, financial_goal_canceled, goal_contribution_added, goal_withdrawal_added]
    ActivityEntityType:
      type: string
      enum: [transaction, account_transfer, account_balance_adjustment, credit_card_invoice, financial_event, subscription, subscription_charge, category, category_budget, financial_goal, goal_contribution]
    FinancialTimelineType:
      type: string
      enum: [income, expense, transfer, adjustment]
    FinancialTimelineSourceType:
      type: string
      enum: [transaction, financial_event, credit_card_invoice, fixed_expense, fixed_income, subscription, account_transfer, account_balance_adjustment]
    Transaction:
      type: object
      required: [id, userId, type, amount, description, categoryId, accountId, paymentMethod, occurredAt, source, createdAt, updatedAt]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        userId: { $ref: '#/components/schemas/Uuid' }
        type: { $ref: '#/components/schemas/TransactionType' }
        amount: { $ref: '#/components/schemas/Money' }
        description: { type: string }
        categoryId: { type: [string, 'null'], format: uuid }
        accountId: { type: [string, 'null'], format: uuid }
        paymentMethod:
          oneOf:
            - $ref: '#/components/schemas/PaymentMethod'
            - type: 'null'
        occurredAt: { $ref: '#/components/schemas/DateTime' }
        source: { $ref: '#/components/schemas/TransactionSource' }
        createdAt: { $ref: '#/components/schemas/DateTime' }
        updatedAt: { $ref: '#/components/schemas/DateTime' }
    CreateTransactionRequest:
      type: object
      additionalProperties: false
      required: [type, amount, description, source]
      properties:
        type: { $ref: '#/components/schemas/TransactionType' }
        amount: { type: number, minimum: 0.01, multipleOf: 0.01 }
        description: { type: string, minLength: 1 }
        categoryId: { $ref: '#/components/schemas/Uuid' }
        accountId: { $ref: '#/components/schemas/Uuid' }
        paymentMethod: { $ref: '#/components/schemas/PaymentMethod' }
        occurredAt: { $ref: '#/components/schemas/DateTime' }
        source: { $ref: '#/components/schemas/TransactionSource' }
    UpdateTransactionRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        type: { $ref: '#/components/schemas/TransactionType' }
