      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateGoalContributionRequest' } } }
      responses:
        '201': { description: Aporte ou retirada registrada, content: { application/json: { schema: { $ref: '#/components/schemas/GoalContribution' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/FinancialGoalNotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
