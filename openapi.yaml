        '404': { $ref: '#/components/responses/FinancialGoalNotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Financial goals]
      operationId: cancelFinancialGoal
