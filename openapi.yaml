        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [Subscriptions]
      operationId: createSubscription
      summary: Cria uma assinatura e materializa cobranças futuras
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateSubscriptionRequest' } } }
      responses:
        '201': { description: Assinatura criada, content: { application/json: { schema: { $ref: '#/components/schemas/Subscription' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /subscriptions/summary:
    get:
      tags: [Subscriptions]
