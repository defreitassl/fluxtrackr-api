        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/SubscriptionNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    patch:
      tags: [Subscriptions]
      operationId: updateSubscription
