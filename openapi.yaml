openapi: 3.1.0
info:
  title: FluxTrackr API
  version: 1.0.0
  description: |
    Contrato HTTP da API NestJS do FluxTrackr. A especificação foi derivada dos
    controllers, DTOs, serviços e schema Prisma em 2026-07-16. Não há prefixo
    global de rota: os caminhos abaixo são relativos diretamente à origem.

    Todas as datas e horas usam ISO 8601. Valores retornados pelo domínio
    financeiro são strings decimais com duas casas quando o cálculo precisa
    preservar precisão; os DTOs legados que recebem `number` continuam assim.
servers:
  - url: http://localhost:3000
    description: Desenvolvimento padrão
  - url: http://localhost:3001
    description: Desenvolvimento com PORT=3001
tags:
  - name: Health
  - name: Authentication
  - name: Transactions
  - name: Categories
  - name: Accounts
  - name: Credit cards
  - name: Recurring entries
  - name: Financial planning
  - name: Budgets
  - name: Financial goals
  - name: Subscriptions
  - name: Notification center
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [Health]
      security: []
      operationId: healthCheck
      summary: Verifica a API e a conexão com o banco
      responses:
        '200':
          description: API e banco disponíveis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: API disponível, mas banco indisponível
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/login:
    post:
      tags: [Authentication]
      security: []
      operationId: login
      summary: Autentica por e-mail e senha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: JWT emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessToken'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /transactions:
    get:
      tags: [Transactions]
      operationId: listTransactions
      summary: Lista transações do usuário autenticado
      parameters:
        - $ref: '#/components/parameters/TransactionTypeQuery'
        - $ref: '#/components/parameters/StartDateTimeQuery'
        - $ref: '#/components/parameters/EndDateTimeQuery'
        - $ref: '#/components/parameters/CategoryIdQuery'
        - $ref: '#/components/parameters/AccountIdQuery'
        - $ref: '#/components/parameters/PaymentMethodQuery'
      responses:
        '200':
          description: Transações em ordem decrescente de ocorrência
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Transactions]
      operationId: createTransaction
      summary: Cria uma transação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transação criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /transactions/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Transactions]
      operationId: getTransaction
      summary: Busca uma transação
      responses:
        '200':
          description: Transação encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/TransactionNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Transactions]
      operationId: updateTransaction
      summary: Atualiza parcialmente uma transação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionRequest'
      responses:
        '200':
          description: Transação atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/TransactionNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Transactions]
      operationId: deleteTransaction
      summary: Remove fisicamente uma transação
      responses:
        '200':
          description: Transação removida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/TransactionNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /categories:
    get:
      tags: [Categories]
      operationId: listCategories
      summary: Lista categorias; por padrão, somente as ativas
      parameters:
        - $ref: '#/components/parameters/IsActiveQuery'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/CategoryType'
      responses:
        '200':
          description: Categorias ordenadas por nome
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Categories]
      operationId: createCategory
      summary: Cria uma categoria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Categoria criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /categories/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Categories]
      operationId: getCategory
      summary: Busca uma categoria, inclusive arquivada
      responses:
        '200':
          description: Categoria encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/CategoryNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    patch:
      tags: [Categories]
      operationId: updateCategory
      summary: Atualiza ou arquiva uma categoria
      description: 'Enviar `isActive: false` arquiva a categoria e seus orçamentos ativos.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Categoria atualizada ou resultado de arquivamento
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Category'
                  - $ref: '#/components/schemas/CategoryArchiveUpdateResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/CategoryNotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Categories]
      operationId: archiveCategory
      summary: Arquiva uma categoria e seus orçamentos ativos
      responses:
        '200':
          description: Categoria arquivada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchivedResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/CategoryNotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /accounts:
    get:
      tags: [Accounts]
      operationId: listAccounts
      summary: Lista contas ativas
      responses:
        '200':
          description: Contas ativas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Account' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [Accounts]
      operationId: createAccount
      summary: Cria uma conta financeira
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAccountRequest' }
      responses:
        '201':
          description: Conta criada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /accounts/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Accounts]
      operationId: getAccount
      summary: Busca uma conta, inclusive arquivada
      responses:
        '200':
          description: Conta encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/AccountNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    patch:
      tags: [Accounts]
      operationId: updateAccount
      summary: Atualiza ou arquiva uma conta
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAccountRequest' }
      responses:
        '200':
          description: Conta atualizada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/AccountNotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Accounts]
      operationId: archiveAccount
      summary: Arquiva uma conta
      responses:
        '200':
          description: Conta arquivada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArchivedResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/AccountNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /accounts/{accountId}/balance-adjustments:
    parameters:
      - $ref: '#/components/parameters/AccountIdPath'
    get:
      tags: [Accounts]
      operationId: listAccountBalanceAdjustments
      summary: Lista ajustes de saldo de uma conta
      responses:
        '200':
          description: Ajustes em ordem decrescente
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AccountBalanceAdjustment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [Accounts]
      operationId: createAccountBalanceAdjustment
      summary: Ajusta o saldo de uma conta ativa pelo novo saldo informado
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBalanceAdjustmentRequest' }
      responses:
        '201':
          description: Ajuste criado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateBalanceAdjustmentResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /accounts/{accountId}/balance:
    get:
      tags: [Accounts]
      operationId: getAccountBalance
      summary: Calcula o saldo de uma conta até um instante
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/AsOfDateTimeQuery'
      responses:
        '200':
          description: Decomposição do saldo
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountBalance' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/AccountNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /account-transfers:
    get:
      tags: [Accounts]
      operationId: listAccountTransfers
      summary: Lista transferências entre contas
      parameters:
        - $ref: '#/components/parameters/AccountIdQuery'
        - name: sourceAccountId
          in: query
          schema: { $ref: '#/components/schemas/Uuid' }
        - name: destinationAccountId
          in: query
          schema: { $ref: '#/components/schemas/Uuid' }
        - $ref: '#/components/parameters/StartDateQuery'
        - $ref: '#/components/parameters/EndDateQuery'
      responses:
        '200':
          description: Transferências em ordem decrescente
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AccountTransfer' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [Accounts]
      operationId: createAccountTransfer
      summary: Cria uma transferência entre duas contas ativas no horário atual da API
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAccountTransferRequest' }
      responses:
        '201':
          description: Transferência criada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountTransfer' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /account-transfers/{id}:
    get:
      tags: [Accounts]
      operationId: getAccountTransfer
      summary: Busca uma transferência
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Transferência encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountTransfer' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/AccountTransferNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /fixed-expenses:
    get:
      tags: [Recurring entries]
      operationId: listFixedExpenses
      summary: Lista despesas fixas ativas
      responses:
        '200':
          description: Despesas fixas ativas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FixedExpense' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [Recurring entries]
      operationId: createFixedExpense
      summary: Cria uma despesa fixa
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFixedExpenseRequest' }
      responses:
        '201':
          description: Despesa fixa criada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FixedExpense' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /fixed-expenses/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    get:
      tags: [Recurring entries]
      operationId: getFixedExpense
      summary: Busca uma despesa fixa, inclusive arquivada
      responses:
        '200': { description: Despesa fixa, content: { application/json: { schema: { $ref: '#/components/schemas/FixedExpense' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/FixedExpenseNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    patch:
      tags: [Recurring entries]
      operationId: updateFixedExpense
      summary: Atualiza uma despesa fixa
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateFixedExpenseRequest' } } }
      responses:
        '200': { description: Despesa fixa atualizada, content: { application/json: { schema: { $ref: '#/components/schemas/FixedExpense' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/FixedExpenseNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Recurring entries]
      operationId: archiveFixedExpense
      summary: Arquiva uma despesa fixa
      responses:
        '200': { description: Despesa fixa arquivada, content: { application/json: { schema: { $ref: '#/components/schemas/ArchivedResponse' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/FixedExpenseNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /fixed-incomes:
    get:
      tags: [Recurring entries]
      operationId: listFixedIncomes
      summary: Lista receitas fixas ativas
      responses:
        '200':
          description: Receitas fixas ativas
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/FixedIncome' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [Recurring entries]
      operationId: createFixedIncome
      summary: Cria uma receita fixa
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateFixedIncomeRequest' } } }
      responses:
        '201': { description: Receita fixa criada, content: { application/json: { schema: { $ref: '#/components/schemas/FixedIncome' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /fixed-incomes/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    get:
      tags: [Recurring entries]
      operationId: getFixedIncome
      summary: Busca uma receita fixa, inclusive arquivada
      responses:
        '200': { description: Receita fixa, content: { application/json: { schema: { $ref: '#/components/schemas/FixedIncome' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/FixedIncomeNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    patch:
      tags: [Recurring entries]
      operationId: updateFixedIncome
      summary: Atualiza uma receita fixa
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateFixedIncomeRequest' } } }
      responses:
        '200': { description: Receita fixa atualizada, content: { application/json: { schema: { $ref: '#/components/schemas/FixedIncome' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/FixedIncomeNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Recurring entries]
      operationId: archiveFixedIncome
      summary: Arquiva uma receita fixa
      responses:
        '200': { description: Receita fixa arquivada, content: { application/json: { schema: { $ref: '#/components/schemas/ArchivedResponse' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/FixedIncomeNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /fixed-occurrences:
    get:
      tags: [Recurring entries]
      operationId: listFixedOccurrences
      summary: Lista ocorrências mensais persistidas
      parameters:
        - name: type
          in: query
          schema: { $ref: '#/components/schemas/FixedOccurrenceType' }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/FixedOccurrenceStatus' }
        - $ref: '#/components/parameters/StartDateQuery'
        - $ref: '#/components/parameters/EndDateQuery'
        - name: fixedExpenseId
          in: query
          schema: { $ref: '#/components/schemas/Uuid' }
        - name: fixedIncomeId
          in: query
          schema: { $ref: '#/components/schemas/Uuid' }
      responses:
        '200':
          description: Ocorrências em ordem cronológica
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/FixedOccurrence' } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /fixed-occurrences/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    get:
      tags: [Recurring entries]
      operationId: getFixedOccurrence
      summary: Busca uma ocorrência fixa
      responses:
        '200': { description: Ocorrência encontrada, content: { application/json: { schema: { $ref: '#/components/schemas/FixedOccurrence' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/FixedOccurrenceNotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /fixed-occurrences/{id}/realize:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    post:
      tags: [Recurring entries]
      operationId: realizeFixedOccurrence
      summary: Realiza uma ocorrência pendente e cria uma transação
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/RealizeFixedOccurrenceRequest' } } }
      responses:
        '201':
          description: Ocorrência e transação realizadas atomicamente
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RealizeFixedOccurrenceResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
